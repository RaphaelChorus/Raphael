<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라파엘코러스 제14회 정기연주회</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: #0f0a00;
            color: #f4e9d8;
            text-align: center;
        }
        .poster {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 {
            color: #f4c542;
            margin: 20px 0 10px;
        }
        .buttons {
            margin: 40px auto;
            max-width: 400px;
        }
        .btn {
            display: block;
            margin: 15px auto;
            padding: 18px 30px;
            font-size: 1.3em;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .btn-ticket {
            background: #007bff;
            color: white;
        }
        .btn-support {
            background: #e63939;
            color: white;
        }
        .btn:hover {
            transform: scale(1.05);
            opacity: 0.95;
        }
        .info {
            margin: 30px 20px;
            font-size: 1.1em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <img src="20260825poster.png" alt="라파엘코러스 제14회 정기연주회 포스터" class="poster">

    <h1>얼리버드 특별 할인 행사 중</h1>
    <p style="font-size:1.2em;">7월 중 50% 할인</p>

    <div class="buttons">
        <a href="https://www.ticketlink.co.kr/product/64418" class="btn btn-ticket" target="_blank">
            🎟️ 티켓 예매하기
        </a>
        <a href="https://raphaelchorus.github.io/Raphael/Support_Raphael" class="btn btn-support" target="_blank">
            ❤️ 후원으로 응원하기
        </a>
    </div>

    <div class="info">
       
        
        <p>노래로 찾은 빛<br>
        노래로 밝히는 세상 💫</p>
    </div>
</body>
</html>
